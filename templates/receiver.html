<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropIt - Join Transfer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Join DropIt</h1>
            <p id="statusText" class="subtitle">🔒 Secure Handshake in Progress...</p>
            
            <div id="transferInfo" style="display: none;" class="mt-4">
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Progress</span>
                        <span id="progressPercent" class="stat-value">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">File Name</span>
                        <span id="fileName" class="stat-value">---</span>
                    </div>
                </div>
                <div class="progress-wrapper">
                    <p id="progressLabel" class="text-center" style="font-size: 0.8rem; margin-bottom: 8px;">Incoming Transfer</p>
                    <div class="progress-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="/tos">Terms</a>
        <a href="/privacy">Privacy</a>
        <a href="/about">About Us</a>
    </div>

    <script src="/static/webrtc.js"></script>
    <script src="/static/receiver.js"></script>
</body>
</html>
