<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropIt - Ultra Fast P2P Transfer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>DropIt</h1>
            <p class="subtitle">Secure, Browser-to-Browser File Transfer</p>
            
            <div id="dropZone" class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <span class="drop-icon">🚀</span>
                <p id="dropText">Drop a file here or browse</p>
                <p style="font-size: 0.75rem; color: var(--text-dim); margin-top: 8px;">Direct P2P Encryption Enabled</p>
                <input type="file" id="fileInput" hidden onchange="handleFile(this.files)">
            </div>

            <div id="sessionInfo" style="display: none;" class="mt-4">
                <p class="text-center" style="font-size: 0.85rem; color: var(--text-dim);">Your link is ready</p>
                <div class="share-box">
                    <span id="shareLink"></span>
                    <button onclick="copyToClipboard()" class="btn">Copy</button>
                </div>
                <div class="mt-4 text-center">
                    <p id="statusText"><span class="pulse"></span>Waiting for connection...</p>
                </div>
            </div>

            <div id="transferInfo" style="display: none;" class="mt-4">
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Progress</span>
                        <span id="progressPercent" class="stat-value">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">ETA</span>
                        <span id="etaText" class="stat-value">Calculating...</span>
                    </div>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/webrtc.js"></script>
    <script src="/static/sender.js"></script>
    <script>
        async function copyToClipboard() {
            const link = document.getElementById('shareLink').innerText;
            await navigator.clipboard.writeText(link);
            const btn = document.querySelector('.btn');
            btn.innerText = 'Copied!';
            btn.style.background = 'var(--success)';
            setTimeout(() => { 
                btn.innerText = 'Copy'; 
                btn.style.background = 'var(--primary)';
            }, 2000);
        }

        const dz = document.getElementById('dropZone');
        dz.ondragover = (e) => { e.preventDefault(); dz.style.borderColor = "var(--primary)"; };
        dz.ondragleave = () => { dz.style.borderColor = "var(--border)"; };
        dz.ondrop = (e) => {
            e.preventDefault();
            dz.style.borderColor = "var(--border)";
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files);
        };
    </script>
</body>
</html>
